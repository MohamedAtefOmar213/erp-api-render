services:
  - type: web
    name: erp-api
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: API_TOKEN
        value: change-this-token
      - key: AZURE_SERVER
        sync: false
      - key: AZURE_DATABASE
        sync: false
      - key: AZURE_USERNAME
        sync: false
      - key: AZURE_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.3
